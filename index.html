<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文化祭 🎡 先生ルーレット</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap');

    :root {
      --navy: #1a237e;
      --pink: #ff4081;
      --yellow: #ffeb3b;
      --mint: #69f0ae;
      --orange: #ff9800;
      --white: #fffef7;
      --shadow: 0 8px 24px rgba(26, 35, 126, 0.25);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'M PLUS Rounded 1c', sans-serif;
      min-height: 100vh;
      background:
        repeating-linear-gradient(
          -45deg,
          #e8eaf6 0, #e8eaf6 20px,
          #c5cae9 20px, #c5cae9 40px
        );
      color: var(--navy);
      padding: 1rem;
    }

    .confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .confetti span {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      animation: fall 6s linear infinite;
      opacity: 0.6;
    }

    @keyframes fall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0.3; }
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    header h1 {
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 800;
      background: linear-gradient(135deg, var(--pink), var(--orange));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(2px 2px 0 var(--navy));
    }

    header p {
      font-size: 0.95rem;
      margin-top: 0.25rem;
      font-weight: 700;
    }

    .badge {
      display: inline-block;
      background: var(--yellow);
      border: 3px solid var(--navy);
      border-radius: 999px;
      padding: 0.2rem 1rem;
      font-size: 0.8rem;
      font-weight: 800;
      margin-top: 0.5rem;
      transform: rotate(-2deg);
    }

    .panel {
      background: var(--white);
      border: 4px solid var(--navy);
      border-radius: 20px;
      padding: 1.25rem;
      box-shadow: var(--shadow);
      margin-bottom: 1rem;
    }

    .grid {
      display: grid;
      gap: 1rem;
    }

    @media (min-width: 768px) {
      .grid { grid-template-columns: 1fr 280px; }
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 0.35rem;
      font-size: 0.9rem;
    }

    input[type="text"],
    select {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 3px solid var(--navy);
      border-radius: 12px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      background: #fff;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--pink);
      box-shadow: 0 0 0 3px rgba(255, 64, 129, 0.3);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.85rem 1.5rem;
      border: 3px solid var(--navy);
      border-radius: 14px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 4px 4px 0 var(--navy);
    }

    .btn:hover:not(:disabled) {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 var(--navy);
    }

    .btn:active:not(:disabled) {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 var(--navy);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: linear-gradient(180deg, var(--pink), #f50057);
      color: white;
    }

    .btn-spin {
      background: linear-gradient(180deg, var(--mint), #00e676);
      color: var(--navy);
      width: 100%;
      font-size: 1.15rem;
      margin-top: 0.75rem;
    }

    .btn-secondary {
      background: var(--yellow);
      color: var(--navy);
    }

    .status-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .stat {
      flex: 1;
      min-width: 120px;
      background: linear-gradient(135deg, #e3f2fd, #bbdefb);
      border: 3px solid var(--navy);
      border-radius: 14px;
      padding: 0.75rem 1rem;
      text-align: center;
    }

    .stat .label { font-size: 0.75rem; font-weight: 700; opacity: 0.8; }
    .stat .value { font-size: 1.5rem; font-weight: 800; color: var(--pink); }

    .wheel-wrap {
      position: relative;
      width: min(320px, 90vw);
      margin: 0 auto 1rem;
    }

    .wheel-pointer {
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-top: 28px solid var(--navy);
      z-index: 10;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2));
    }

    #wheel {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 50%;
      border: 6px solid var(--navy);
      box-shadow: var(--shadow), inset 0 0 0 4px var(--white);
      transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
    }

    .result-box {
      min-height: 100px;
      background: linear-gradient(135deg, #fff9c4, #fff59d);
      border: 3px dashed var(--orange);
      border-radius: 14px;
      padding: 1rem;
      text-align: center;
      display: none;
    }

    .result-box.show { display: block; animation: pop 0.4s ease; }

    @keyframes pop {
      0% { transform: scale(0.9); opacity: 0; }
      70% { transform: scale(1.03); }
      100% { transform: scale(1); opacity: 1; }
    }

    .result-box .teacher-name {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--pink);
    }

    .result-box .effect {
      font-size: 1.1rem;
      font-weight: 800;
      margin: 0.35rem 0;
    }

    .result-box .comment {
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .ranking h2 {
      font-size: 1.1rem;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    .rank-list {
      list-style: none;
    }

    .rank-list li {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0;
      border-bottom: 2px dotted #c5cae9;
      font-weight: 700;
    }

    .rank-list li:last-child { border-bottom: none; }

    .rank-num {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--navy);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    .rank-list li:nth-child(1) .rank-num { background: gold; color: var(--navy); }
    .rank-list li:nth-child(2) .rank-num { background: silver; color: var(--navy); }
    .rank-list li:nth-child(3) .rank-num { background: #cd7f32; color: white; }

    .rank-chips { margin-left: auto; color: var(--pink); }

    .hidden { display: none !important; }

    .bet-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .bet-chips label {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.4rem 0.75rem;
      border: 2px solid var(--navy);
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.85rem;
      margin: 0;
      transition: background 0.15s;
    }

    .bet-chips input { accent-color: var(--pink); }
    .bet-chips label:has(input:checked) {
      background: var(--pink);
      color: white;
    }

    /* 朝礼オーバーレイ */
    #assembly-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26, 35, 126, 0.92);
      z-index: 1000;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
      padding: 2rem;
    }

    #assembly-overlay.active {
      display: flex;
      animation: assemblyIn 0.5s ease;
    }

    @keyframes assemblyIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    #assembly-overlay h2 {
      font-size: clamp(2rem, 8vw, 4rem);
      font-weight: 800;
      animation: pulse 1s ease infinite;
      margin-bottom: 1rem;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    #assembly-overlay p {
      font-size: 1.2rem;
      font-weight: 700;
      max-width: 400px;
      line-height: 1.6;
    }

    .assembly-flag {
      font-size: 4rem;
      margin-bottom: 1rem;
      animation: wave 0.8s ease-in-out infinite alternate;
    }

    @keyframes wave {
      from { transform: rotate(-10deg); }
      to { transform: rotate(10deg); }
    }

    .teacher-legend {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.4rem;
      font-size: 0.7rem;
      margin-top: 0.75rem;
      font-weight: 700;
    }

    .teacher-legend span {
      padding: 0.25rem 0.4rem;
      border-radius: 6px;
      border: 2px solid var(--navy);
    }
  </style>
</head>
<body>
  <div class="confetti" id="confetti" aria-hidden="true"></div>

  <div id="assembly-overlay" role="dialog" aria-labelledby="assembly-title">
    <div class="assembly-flag">🎌</div>
    <h2 id="assembly-title">朝礼開始！！</h2>
    <p>校長先生の号令で、全員のチップがリセットされました。<br>気を引き締めて、もう一度文化祭を楽しもう！</p>
    <button type="button" class="btn btn-secondary" id="assembly-close" style="margin-top: 2rem;">了解！</button>
  </div>

  <div class="container">
    <header>
      <h1>🎡 文化祭 先生ルーレット 🎡</h1>
      <p>賭けてスピン！ 運命の先生がチップを左右する！</p>
      <span class="badge">○○高校 2年3組 出店</span>
    </header>

    <!-- スタート画面 -->
    <section class="panel" id="start-screen">
      <label for="player-name">プレイヤー名</label>
      <input type="text" id="player-name" placeholder="例：たろう" maxlength="12" autocomplete="nickname">
      <button type="button" class="btn btn-primary" id="start-btn" style="margin-top: 1rem; width: 100%;">
        🎮 ゲームスタート（チップ100枚）
      </button>
    </section>

    <!-- ゲーム画面 -->
    <section id="game-screen" class="hidden">
      <div class="status-bar">
        <div class="stat">
          <div class="label">プレイヤー</div>
          <div class="value" id="display-name" style="font-size:1.1rem;color:var(--navy);">—</div>
        </div>
        <div class="stat">
          <div class="label">所持チップ</div>
          <div class="value" id="chip-count">100</div>
        </div>
      </div>

      <div class="grid">
        <div class="panel">
          <div class="wheel-wrap">
            <div class="wheel-pointer" aria-hidden="true"></div>
            <canvas id="wheel" width="400" height="400" role="img" aria-label="先生ルーレット"></canvas>
          </div>

          <fieldset class="bet-chips" id="bet-fieldset">
            <legend style="font-weight:800;margin-bottom:0.5rem;font-size:0.9rem;">賭けるチップ</legend>
            <label><input type="radio" name="bet" value="5" checked> 5</label>
            <label><input type="radio" name="bet" value="10"> 10</label>
            <label><input type="radio" name="bet" value="20"> 20</label>
            <label><input type="radio" name="bet" value="50"> 50</label>
            <label><input type="radio" name="bet" value="100" data-allin> オールイン</label>
          </fieldset>

          <button type="button" class="btn btn-spin" id="spin-btn">🎰 ルーレットを回す！</button>

          <div class="result-box" id="result-box">
            <div class="teacher-name" id="result-teacher"></div>
            <div class="effect" id="result-effect"></div>
            <div class="comment" id="result-comment"></div>
          </div>

          <div class="teacher-legend" id="legend"></div>
        </div>

        <aside class="panel ranking">
          <h2>🏆 ランキング TOP5</h2>
          <ol class="rank-list" id="rank-list"></ol>
          <button type="button" class="btn btn-secondary" id="end-btn" style="width:100%;margin-top:0.75rem;font-size:0.85rem;">
            記録を保存して終了
          </button>
        </aside>
      </div>
    </section>
  </div>

  <script>
    const TEACHERS = [
      {
        id: 'onito',
        name: '鬼頭先生',
        subject: '数学',
        color: '#5c6bc0',
        effect: 'multiply',
        multiplier: 3,
        effectText: 'チップ3倍！',
        comments: [
          '証明完了！ 君のチップも倍々だ！',
          '因数分解のように、チップが増殖するぞ！',
          'πより美味しいのは3倍のチップだ！'
        ]
      },
      {
        id: 'bakuretsu',
        name: '爆裂先生',
        subject: '体育',
        color: '#ef5350',
        effect: 'multiply',
        multiplier: 2.5,
        effectText: 'チップ2.5倍！',
        comments: [
          'ダッシュ！ チップも全力疾走！',
          '筋トレより効くのは、爆裂のルーレットだ！',
          'ランニングのごとく、チップが伸びたぞ！'
        ]
      },
      {
        id: 'sato',
        name: '佐藤先生',
        subject: '英語',
        color: '#42a5f5',
        effect: 'multiply',
        multiplier: 2,
        effectText: 'チップ2倍！',
        comments: [
          'Double chips! Very good!',
          '英語で言うなら… Double your luck!',
          '発音は perfect、チップも perfect！'
        ]
      },
      {
        id: 'murata',
        name: '村田先生',
        subject: '担任',
        color: '#66bb6a',
        effect: 'multiply',
        multiplier: 1.5,
        effectText: 'チップ1.5倍！',
        comments: [
          'みんな、ちゃんと増えてる？ 担任が見守ってるよ。',
          'クラスみんなで、チップを盛り上げよう！',
          '連絡帳には書かないから、安心してね。'
        ]
      },
      {
        id: 'nemuta',
        name: '眠田先生',
        subject: '古文',
        color: '#ab47bc',
        effect: 'multiply',
        multiplier: 1.5,
        effectText: 'チップ1.5倍！',
        comments: [
          'zzz… あ、起きた。チップは1.5倍だよ…',
          '古今集より、チップ集の方が面白い…',
          '眠いけど、古文のように味わい深い結果だ。'
        ]
      },
      {
        id: 'nakajima',
        name: '中島先生',
        subject: '理科',
        color: '#26a69a',
        effect: 'respin',
        effectText: 'もう一回スピン！',
        comments: [
          '実験成功！ もう一度、反応を観察しよう！',
          '仮説：もう一回回せば、さらに面白い！',
          '科学の世界では、再現性が大事だからね。'
        ]
      },
      {
        id: 'kyoto',
        name: '教頭先生',
        subject: '教頭',
        color: '#78909c',
        effect: 'confiscate',
        effectText: 'チップ没収！',
        comments: [
          '廊下で走るな！ …チップも没収だ。',
          '規律を守れ。賭けたチップはすべて没収。',
          '反省文… いや、没収で許してやろう。'
        ]
      },
      {
        id: 'principal',
        name: '校長先生',
        subject: '校長',
        color: '#ff7043',
        effect: 'reset',
        effectText: 'チップ全リセット！',
        comments: [
          'えー、それでは全校生徒に告げます。朝礼を始めます。',
          '校長室に来なさい… いや、チップをリセットだ！',
          '我が校の伝統を守るため、チップは初期化する！'
        ]
      }
    ];

    const START_CHIPS = 100;
    const RANKING_KEY = 'senseiRouletteRanking';
    const SEGMENT_ANGLE = 360 / TEACHERS.length;

    let playerName = '';
    let chips = START_CHIPS;
    let spinning = false;
    let currentRotation = 0;
    let maxChipsThisSession = START_CHIPS;

    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');

    function initConfetti() {
      const container = document.getElementById('confetti');
      const colors = ['#ff4081', '#ffeb3b', '#69f0ae', '#42a5f5', '#ff7043'];
      for (let i = 0; i < 40; i++) {
        const s = document.createElement('span');
        s.style.left = Math.random() * 100 + '%';
        s.style.background = colors[i % colors.length];
        s.style.animationDelay = Math.random() * 6 + 's';
        s.style.animationDuration = 4 + Math.random() * 4 + 's';
        container.appendChild(s);
      }
    }

    function drawWheel() {
      const size = canvas.width;
      const cx = size / 2;
      const cy = size / 2;
      const r = size / 2 - 4;

      ctx.clearRect(0, 0, size, size);

      TEACHERS.forEach((t, i) => {
        const start = (i * SEGMENT_ANGLE - 90) * Math.PI / 180;
        const end = ((i + 1) * SEGMENT_ANGLE - 90) * Math.PI / 180;

        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, start, end);
        ctx.closePath();
        ctx.fillStyle = t.color;
        ctx.fill();
        ctx.strokeStyle = '#1a237e';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(start + (end - start) / 2);
        ctx.textAlign = 'right';
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 14px "M PLUS Rounded 1c", sans-serif';
        ctx.shadowColor = 'rgba(0,0,0,0.4)';
        ctx.shadowBlur = 2;
        const label = t.name.replace('先生', '');
        ctx.fillText(label, r - 20, 5);
        ctx.restore();
      });

      ctx.beginPath();
      ctx.arc(cx, cy, 28, 0, Math.PI * 2);
      ctx.fillStyle = '#fffef7';
      ctx.fill();
      ctx.strokeStyle = '#1a237e';
      ctx.lineWidth = 4;
      ctx.stroke();
      ctx.fillStyle = '#1a237e';
      ctx.font = 'bold 11px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('SPIN', cx, cy);
    }

    function buildLegend() {
      const legend = document.getElementById('legend');
      legend.innerHTML = TEACHERS.map(t =>
        `<span style="background:${t.color}22;border-color:${t.color}">${t.name}：${t.effectText}</span>`
      ).join('');
    }

    function getRankings() {
      try {
        return JSON.parse(localStorage.getItem(RANKING_KEY) || '[]');
      } catch {
        return [];
      }
    }

    function saveRanking(name, score) {
      let list = getRankings();
      const existing = list.findIndex(r => r.name === name);
      if (existing >= 0) {
        if (score > list[existing].chips) list[existing].chips = score;
      } else {
        list.push({ name, chips: score, date: Date.now() });
      }
      list.sort((a, b) => b.chips - a.chips);
      list = list.slice(0, 20);
      localStorage.setItem(RANKING_KEY, JSON.stringify(list));
      renderRanking();
    }

    function renderRanking() {
      const list = getRankings().slice(0, 5);
      const ol = document.getElementById('rank-list');
      if (list.length === 0) {
        ol.innerHTML = '<li style="opacity:0.7;font-weight:700;">まだ記録なし</li>';
        return;
      }
      ol.innerHTML = list.map((r, i) =>
        `<li>
          <span class="rank-num">${i + 1}</span>
          <span>${escapeHtml(r.name)}</span>
          <span class="rank-chips">${r.chips}枚</span>
        </li>`
      ).join('');
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function updateUI() {
      document.getElementById('chip-count').textContent = chips;
      maxChipsThisSession = Math.max(maxChipsThisSession, chips);
      updateBetOptions();
    }

    function updateBetOptions() {
      const allIn = document.querySelector('input[name="bet"][data-allin]');
      if (allIn) {
        allIn.value = Math.max(chips, 1);
        const allInLabel = allIn.closest('label');
        const textNode = [...allInLabel.childNodes].find(n => n.nodeType === Node.TEXT_NODE);
        if (textNode) textNode.textContent = chips > 0 ? ` オールイン(${chips})` : ' オールイン';
      }
      document.querySelectorAll('input[name="bet"]').forEach(input => {
        const val = parseInt(input.value, 10);
        const label = input.closest('label');
        label.style.opacity = chips >= val && val > 0 ? '1' : '0.4';
        input.disabled = chips < val || val <= 0 || spinning;
      });
      const checked = document.querySelector('input[name="bet"]:checked');
      if (!checked || checked.disabled) {
        const first = [...document.querySelectorAll('input[name="bet"]')].find(i => !i.disabled);
        if (first) first.checked = true;
      }
    }

    function getBet() {
      const val = parseInt(document.querySelector('input[name="bet"]:checked')?.value || '5', 10);
      return Math.min(val, chips);
    }

    function randomComment(teacher) {
      return teacher.comments[Math.floor(Math.random() * teacher.comments.length)];
    }

    function showResult(teacher, effectLine, comment) {
      const box = document.getElementById('result-box');
      document.getElementById('result-teacher').textContent = `${teacher.name}（${teacher.subject}）`;
      document.getElementById('result-effect').textContent = effectLine;
      document.getElementById('result-comment').textContent = comment;
      box.classList.add('show');
    }

    function spinToIndex(index, callback) {
      const extraSpins = 5 + Math.floor(Math.random() * 3);
      const targetAngle = 360 - (index * SEGMENT_ANGLE + SEGMENT_ANGLE / 2);
      const currentMod = currentRotation % 360;
      let delta = targetAngle - currentMod;
      if (delta < 0) delta += 360;
      currentRotation += extraSpins * 360 + delta;

      canvas.style.transform = `rotate(${currentRotation}deg)`;

      setTimeout(() => {
        callback(TEACHERS[index]);
      }, 4100);
    }

    function applyEffect(teacher, bet, isRespin) {
      let effectLine = teacher.effectText;
      let comment = randomComment(teacher);
      let chipsBefore = chips;

      switch (teacher.effect) {
        case 'multiply': {
          const winnings = Math.floor(bet * teacher.multiplier);
          chips += winnings;
          effectLine = `+${winnings}枚獲得！（${teacher.effectText}）`;
          break;
        }
        case 'respin':
          effectLine = teacher.effectText + '（賭け金はそのまま）';
          break;
        case 'confiscate':
          chips = 0;
          effectLine = '所持チップをすべて没収！';
          break;
        case 'reset':
          chips = START_CHIPS;
          effectLine = teacher.effectText;
          showAssemblyOverlay();
          break;
      }

      showResult(teacher, effectLine, comment);
      updateUI();

      if (teacher.effect === 'respin' && !isRespin) {
        setTimeout(() => {
          document.getElementById('result-comment').textContent = '中島先生の実験で、もう一度回転中…';
          spinRound(bet, true);
        }, 1500);
      }

      if (chips <= 0 && teacher.effect !== 'reset') {
        setTimeout(() => {
          document.getElementById('result-comment').textContent += ' …チップがゼロ！記録を保存して終了しよう。';
        }, 500);
      }

      return { chipsBefore, chipsAfter: chips };
    }

    function showAssemblyOverlay() {
      document.getElementById('assembly-overlay').classList.add('active');
    }

    function spinRound(betOverride, isRespin) {
      if (spinning && !isRespin) return;

      const bet = betOverride ?? getBet();
      if (bet <= 0 || bet > chips) {
        alert('賭けられるチップがありません！');
        return;
      }

      spinning = true;
      document.getElementById('spin-btn').disabled = true;
      document.querySelectorAll('input[name="bet"]').forEach(i => i.disabled = true);

      if (!isRespin) {
        chips -= bet;
        updateUI();
      }

      document.getElementById('result-box').classList.remove('show');

      const index = Math.floor(Math.random() * TEACHERS.length);

      spinToIndex(index, (teacher) => {
        applyEffect(teacher, bet, isRespin);
        spinning = false;
        document.getElementById('spin-btn').disabled = chips <= 0;
        updateBetOptions();
      });
    }

    document.getElementById('start-btn').addEventListener('click', () => {
      const name = document.getElementById('player-name').value.trim();
      if (!name) {
        alert('名前を入力してください！');
        return;
      }
      playerName = name;
      chips = START_CHIPS;
      maxChipsThisSession = START_CHIPS;
      currentRotation = 0;
      canvas.style.transform = 'rotate(0deg)';

      document.getElementById('start-screen').classList.add('hidden');
      document.getElementById('game-screen').classList.remove('hidden');
      document.getElementById('display-name').textContent = playerName;
      document.getElementById('result-box').classList.remove('show');
      updateUI();
      drawWheel();
    });

    document.getElementById('spin-btn').addEventListener('click', () => spinRound());

    document.getElementById('end-btn').addEventListener('click', () => {
      saveRanking(playerName, maxChipsThisSession);
      alert(`${playerName}さんの最高記録 ${maxChipsThisSession}枚 を保存しました！`);
      document.getElementById('game-screen').classList.add('hidden');
      document.getElementById('start-screen').classList.remove('hidden');
      document.getElementById('player-name').value = '';
      spinning = false;
    });

    document.getElementById('assembly-close').addEventListener('click', () => {
      document.getElementById('assembly-overlay').classList.remove('active');
    });

    document.getElementById('player-name').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('start-btn').click();
    });

    initConfetti();
    buildLegend();
    drawWheel();
    renderRanking();
  </script>
</body>
</html>
